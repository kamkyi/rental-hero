services:
  rentalhero:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      CI: "false"
    volumes:
      - .:/app
      - rentalhero_node_modules:/app/node_modules
    command: sh -c "npm install && npm run start:docker"
    stdin_open: true
    tty: true

volumes:
  rentalhero_node_modules:
